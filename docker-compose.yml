services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: labdb2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labdb2"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
  
  backend: 
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes: 
  pgdata2:
      